name: Vettingo Exam Service CI
on:
  push:
    branches:
      - master
    paths:
      - src/ExamService/**
      - tests/Vettingo.ExamService.Tests/**
  pull_request:
    branches:
      - master
    paths:
      - src/ExamService/**
      - tests/Vettingo.ExamService.Tests/**
jobs:
  build-on-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set Up Dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Restore Dotnet Project
        runs: dotnet restore src/ExamService/**/*.csproj
      - name: Build Dotnet Project
        runs: dotnet build src/ExamService/Vettingo.ExamService.API --configuration Release
      - name: Test Dotnet Project
        runs: dotnet test tests/Vettingo.ExamService.Tests --configuration release --verbosity normal --no-build --logger "trx;LogFileName=test_results.trx" --collect:"XPlat Code Coverage"
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/Vettingo.ExamService.Tests/TestResults
          retention-days: 30
      - name: Upload Code Coverage
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path : tests/Vettingo.ExamService.Tests/TestResults/**/coverage.cobertura.xml
          retention-days: 30