        target: /var/lib/postgresql/data
        volume: {}
  gateway:
    build:
      context: ..
      dockerfile: src/Gateway/Vettingo.Gateway.API/Dockerfile
    depends_on:
      analytics-api:
        condition: service_started
        required: true
      application-api:
        condition: service_started
        required: true
      auth-api:
        condition: service_started
        required: true
      evaluation-api:
        condition: service_started
        required: true
      exam-api:
        condition: service_started
        required: true
      interview-api:
        condition: service_started
        required: true
      job-api:
        condition: service_started
        required: true
      notification-api:
        condition: service_started
        required: true
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__RabbitMq: amqp://vettingo:VettingoRabbit_2026!@rabbitmq:5672/
      ConnectionStrings__Redis: redis:6379,password=VettingoRedis_2026!,abortConnect=false
      DOTNET_RUNNING_IN_CONTAINER: "true"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Password: VettingoRabbit_2026!
      RabbitMq__Port: "5672"
      RabbitMq__UserName: vettingo
      RabbitMq__VirtualHost: /
      Redis__ConnectionString: redis:6379,password=VettingoRedis_2026!,abortConnect=false
      ReverseProxy__Clusters__analyticsservice__Destinations__analyticsservice__Address: http://analytics-api:8080/api/analytics
      ReverseProxy__Clusters__applicationservice__Destinations__applicationservice__Address: http://application-api:8080/api/
      ReverseProxy__Clusters__authservice__Destinations__authservice__Address: http://auth-api:8080/api/auth
      ReverseProxy__Clusters__evaluationservice__Destinations__evaluationservice__Address: http://evaluation-api:8080/api/evaluation
      ReverseProxy__Clusters__examservice__Destinations__examservice__Address: http://exam-api:8080/api/exam
      ReverseProxy__Clusters__interviewservice__Destinations__interviewservice__Address: http://interview-api:8080/api/interview
      ReverseProxy__Clusters__jobservice__Destinations__jobservice__Address: http://job-api:8080/api/job
      ReverseProxy__Clusters__notificationservice__Destinations__notificationservice__Address: http://notification-api:8080/api/notification
    image: vettingo/gateway:local
    init: true
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8080
        published: "5135"
        protocol: tcp
    restart: unless-stopped
  interview-api:
