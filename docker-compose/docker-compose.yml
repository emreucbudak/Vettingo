name: vettingo
services:
  analytics-api:
    build:
      context: ..
      dockerfile: src/AnalyticsService/Vettingo.AnalyticsService.API/Dockerfile
    depends_on:
      analytics-db:
        condition: service_healthy
        required: true
      rabbitmq:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=analytics-db;Port=5432;Database=AnalyticsServiceDb;Username=vettingo;Password=VettingoPostgres_2026!
      ConnectionStrings__RabbitMq: amqp://vettingo:VettingoRabbit_2026!@rabbitmq:5672/
      ConnectionStrings__Redis: redis:6379,password=VettingoRedis_2026!,abortConnect=false
      DOTNET_RUNNING_IN_CONTAINER: "true"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Password: VettingoRabbit_2026!
      RabbitMq__Port: "5672"
      RabbitMq__UserName: vettingo
      RabbitMq__VirtualHost: /
      Redis__ConnectionString: redis:6379,password=VettingoRedis_2026!,abortConnect=false
    image: vettingo/analytics-api:local
    init: true
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8080
        published: "5266"
        protocol: tcp
    restart: unless-stopped
  analytics-db:
    environment:
      POSTGRES_DB: AnalyticsServiceDb
      POSTGRES_PASSWORD: VettingoPostgres_2026!
      POSTGRES_USER: vettingo
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U vettingo
      timeout: 5s
      interval: 5s
      retries: 10
      start_period: 10s
    image: postgres:16-alpine
    networks:
      default: null
    ports:
      - mode: ingress
        target: 5432
        published: "5433"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: analytics-db-data
        target: /var/lib/postgresql/data
        volume: {}
  application-api:
    build:
      context: ..
      dockerfile: src/ApplicationService/Vettingo.ApplicationService.API/Dockerfile
    depends_on:
      application-db:
        condition: service_healthy
        required: true
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=application-db;Port=5432;Database=ApplicationServiceDb;Username=vettingo;Password=${VETTINGO_APPLICATION_DB_PASSWORD:?Set VETTINGO_APPLICATION_DB_PASSWORD}
      DOTNET_RUNNING_IN_CONTAINER: "true"
    image: vettingo/application-api:local
    init: true
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8080
        published: "5267"
        protocol: tcp
    restart: unless-stopped
  application-db:
    environment:
      POSTGRES_DB: ApplicationServiceDb
      POSTGRES_PASSWORD: ${VETTINGO_APPLICATION_DB_PASSWORD:?Set VETTINGO_APPLICATION_DB_PASSWORD}
      POSTGRES_USER: vettingo
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U vettingo
      timeout: 5s
      interval: 5s
      retries: 10
      start_period: 10s
    image: postgres:16-alpine
    networks:
      default: null
    ports:
      - mode: ingress
        target: 5432
        published: "5439"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: application-db-data
        target: /var/lib/postgresql/data
        volume: {}
  auth-api:
    build:
