    image: postgres:16-alpine
    networks:
      default: null
    ports:
      - mode: ingress
        target: 5432
        published: "5436"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: interview-db-data
        target: /var/lib/postgresql/data
        volume: {}
  job-api:
    build:
      context: ..
      dockerfile: src/JobService/Vettingo.JobService.API/Dockerfile
    depends_on:
      job-db:
        condition: service_healthy
        required: true
      rabbitmq:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=job-db;Port=5432;Database=JobServiceDb;Username=vettingo;Password=VettingoPostgres_2026!
      ConnectionStrings__RabbitMq: amqp://vettingo:VettingoRabbit_2026!@rabbitmq:5672/
      ConnectionStrings__Redis: redis:6379,password=VettingoRedis_2026!,abortConnect=false
      DOTNET_RUNNING_IN_CONTAINER: "true"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Password: VettingoRabbit_2026!
      RabbitMq__Port: "5672"
      RabbitMq__UserName: vettingo
      RabbitMq__VirtualHost: /
      Redis__ConnectionString: redis:6379,password=VettingoRedis_2026!,abortConnect=false
    image: vettingo/job-api:local
    init: true
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8080
        published: "5257"
        protocol: tcp
    restart: unless-stopped
  job-db:
    environment:
      POSTGRES_DB: JobServiceDb
      POSTGRES_PASSWORD: VettingoPostgres_2026!
      POSTGRES_USER: vettingo
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U vettingo
      timeout: 5s
      interval: 5s
      retries: 10
      start_period: 10s
    image: postgres:16-alpine
    networks:
      default: null
    ports:
      - mode: ingress
        target: 5432
        published: "5437"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: job-db-data
        target: /var/lib/postgresql/data
        volume: {}
  notification-api:
    build:
      context: ..
      dockerfile: src/NotificationService/Vettingo.NotificationService.API/Dockerfile
    depends_on:
      notification-db:
        condition: service_healthy
        required: true
      rabbitmq:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=notification-db;Port=5432;Database=NotificationServiceDb;Username=vettingo;Password=VettingoPostgres_2026!
      ConnectionStrings__RabbitMq: amqp://vettingo:VettingoRabbit_2026!@rabbitmq:5672/
      ConnectionStrings__Redis: redis:6379,password=VettingoRedis_2026!,abortConnect=false
      DOTNET_RUNNING_IN_CONTAINER: "true"
      RabbitMq__HostName: rabbitmq
      RabbitMq__Password: VettingoRabbit_2026!
      RabbitMq__Port: "5672"
      RabbitMq__UserName: vettingo
      RabbitMq__VirtualHost: /
      Redis__ConnectionString: redis:6379,password=VettingoRedis_2026!,abortConnect=false
    image: vettingo/notification-api:local
    init: true
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8080
        published: "5149"
        protocol: tcp
    restart: unless-stopped
  notification-db:
    environment:
      POSTGRES_DB: NotificationServiceDb
      POSTGRES_PASSWORD: VettingoPostgres_2026!
      POSTGRES_USER: vettingo
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U vettingo
      timeout: 5s
      interval: 5s
      retries: 10
      start_period: 10s
    image: postgres:16-alpine
    networks:
      default: null
    ports:
      - mode: ingress
        target: 5432
        published: "5438"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: notification-db-data
        target: /var/lib/postgresql/data
        volume: {}
  rabbitmq:
    environment:
      RABBITMQ_DEFAULT_PASS: VettingoRabbit_2026!
      RABBITMQ_DEFAULT_USER: vettingo
      RABBITMQ_DEFAULT_VHOST: /
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - -q
        - ping
      timeout: 5s
      interval: 10s
      retries: 10
      start_period: 20s
    image: rabbitmq:3.13-management-alpine
    networks:
      default: null
    ports:
      - mode: ingress
        target: 5672
        published: "5672"
        protocol: tcp
      - mode: ingress
        target: 15672
        published: "15672"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: rabbitmq-data
        target: /var/lib/rabbitmq
        volume: {}
  redis:
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - VettingoRedis_2026!
    healthcheck:
      test:
        - CMD
        - redis-cli
        - -a
        - VettingoRedis_2026!
        - ping
      timeout: 5s
      interval: 5s
      retries: 10
      start_period: 5s
    image: redis:8.8
    networks:
      default: null
    ports:
      - mode: ingress
        target: 6379
        published: "6379"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: redis-data
        target: /data
        volume: {}
networks:
  default:
    name: vettingo-network
volumes:
  analytics-db-data:
    name: vettingo_analytics-db-data
  application-db-data:
    name: vettingo_application-db-data
  auth-db-data:
    name: vettingo_auth-db-data
  evaluation-db-data:
    name: vettingo_evaluation-db-data
  exam-db-data:
    name: vettingo_exam-db-data
  interview-db-data:
    name: vettingo_interview-db-data
  job-db-data:
    name: vettingo_job-db-data
  notification-db-data:
    name: vettingo_notification-db-data
  rabbitmq-data:
    name: vettingo_rabbitmq-data
  redis-data:
    name: vettingo_redis-data
