      dockerfile: src/InterviewService/Vettingo.InterviewService.API/Dockerfile
    depends_on:
      interview-db:
        condition: service_healthy
        required: true
      rabbitmq:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
