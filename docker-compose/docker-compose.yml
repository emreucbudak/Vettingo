      ConnectionStrings__RabbitMq: amqp://vettingo:VettingoRabbit_2026!@rabbitmq:5672/
      ConnectionStrings__Redis: redis:6379,password=VettingoRedis_2026!,abortConnect=false
      DOTNET_RUNNING_IN_CONTAINER: "true"
      JwtSettings__SecretKey: VettingoJwtSecret_DevelopmentOnly_2026_ChangeBeforeProduction_0123456789
      RabbitMq__HostName: rabbitmq
      RabbitMq__Password: VettingoRabbit_2026!
      RabbitMq__Port: "5672"
      RabbitMq__UserName: vettingo
      RabbitMq__VirtualHost: /
      Redis__ConnectionString: redis:6379,password=VettingoRedis_2026!,abortConnect=false
